<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인식표 정보 입력</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f0f4f8;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .card-header {
      background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
      border-radius: 16px 16px 0 0 !important;
      padding: 1.5rem 2rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      padding: 0.75rem;
      letter-spacing: 0.05em;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #163254, #256090);
    }
    .form-control, .form-select {
      border-radius: 8px;
      border: 1.5px solid #c8d6e5;
      font-size: 1rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: #2d6a9f;
      box-shadow: 0 0 0 0.2rem rgba(45,106,159,0.2);
    }
    .rh-group .btn-check:checked + .btn {
      background-color: #1a3a5c;
      color: #fff;
      border-color: #1a3a5c;
    }
    .rh-group .btn {
      border-radius: 8px;
      font-size: 1rem;
      padding: 0.5rem 1.5rem;
    }
    label { font-weight: 600; color: #2c3e50; }
    .badge-note {
      background: #e8f0fb;
      color: #1a3a5c;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.88rem;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
  <div class="container" style="max-width: 480px;">
    <div class="card">
      <div class="card-header text-white text-center">
        <h4 class="mb-1 fw-bold">⚔ 인식표 정보 입력</h4>
        <p class="mb-0 opacity-75" style="font-size:0.9rem;">법무사관 후보생 — 인식표 제작용 정보 수집</p>
      </div>
      <div class="card-body p-4">

        {% if errors %}
        <div class="alert alert-danger rounded-3" role="alert">
          {% for e in errors %}
            <div>{{ e }}</div>
          {% endfor %}
        </div>
        {% endif %}

        <div class="badge-note mb-4">
          입력하신 정보는 인식표 제작 목적으로만 사용됩니다.<br>
          군번 1회 제출 후 수정은 담당자에게 문의해주세요.
        </div>

        <form method="POST" action="/submit" novalidate>

          <!-- 군번 -->
          <div class="mb-3">
            <label for="gun_bun" class="form-label">군번</label>
            <input
              type="text"
              class="form-control"
              id="gun_bun"
              name="gun_bun"
              placeholder="예) 25-123456"
              value="{{ prev.gun_bun if prev else '' }}"
              required
              autocomplete="off"
            />
          </div>

          <!-- 성명 -->
          <div class="mb-3">
            <label for="name" class="form-label">성명</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              placeholder="예) 홍길동"
              value="{{ prev.name if prev else '' }}"
              required
              autocomplete="off"
            />
          </div>

          <!-- 혈액형 -->
          <div class="mb-3">
            <label for="blood_type" class="form-label">혈액형</label>
            <select class="form-select" id="blood_type" name="blood_type" required>
              <option value="" disabled {% if not prev or not prev.blood_type %}selected{% endif %}>선택하세요</option>
              {% for bt in blood_types %}
              <option value="{{ bt }}" {% if prev and prev.blood_type == bt %}selected{% endif %}>{{ bt }}형</option>
              {% endfor %}
            </select>
          </div>

          <!-- RH -->
          <div class="mb-4">
            <label class="form-label d-block">RH</label>
            <div class="rh-group d-flex gap-3">
              <div>
                <input type="radio" class="btn-check" name="rh" id="rh_pos" value="RH+"
                  {% if prev and prev.rh == 'RH+' %}checked{% endif %} required />
                <label class="btn btn-outline-primary" for="rh_pos">RH+</label>
              </div>
              <div>
                <input type="radio" class="btn-check" name="rh" id="rh_neg" value="RH-"
                  {% if prev and prev.rh == 'RH-' %}checked{% endif %} />
                <label class="btn btn-outline-primary" for="rh_neg">RH-</label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">제출하기</button>
        </form>
      </div>
    </div>
    <p class="text-center text-muted mt-3" style="font-size:0.8rem;">
      입력 오류 또는 문의: 담당 간부 연락
    </p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
