<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제출 완료</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background-color: #f0f4f8; font-family: 'Noto Sans KR', sans-serif; }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    .check-icon {
      font-size: 4rem;
      color: #28a745;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="container" style="max-width: 420px;">
    <div class="card text-center p-5">
      <div class="check-icon mb-3">✅</div>
      <h4 class="fw-bold text-success mb-2">제출 완료!</h4>
      <p class="text-muted mb-0">
        <strong>{{ name }}</strong> 후보생의<br>
        인식표 정보가 정상적으로 접수되었습니다.
      </p>
      <hr class="my-4" />
      <p class="text-muted" style="font-size:0.88rem;">
        창을 닫으셔도 됩니다.<br>
        수정이 필요한 경우 담당 간부에게 문의해주세요.
      </p>
    </div>
  </div>
</body>
</html>
