<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인식표 정보 입력</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f0f4f8;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    }
    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
    }
    .card-header {
      background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
      border-radius: 16px 16px 0 0 !important;
      padding: 1.5rem 2rem;
    }
    .btn-submit {
      background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      padding: 0.75rem;
      letter-spacing: 0.05em;
      color: #fff;
      width: 100%;
    }
    .btn-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .form-control, .form-select {
      border-radius: 8px;
      border: 1.5px solid #c8d6e5;
      font-size: 1rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: #2d6a9f;
      box-shadow: 0 0 0 0.2rem rgba(45, 106, 159, 0.2);
    }
    .rh-group .btn-check:checked + .btn {
      background-color: #1a3a5c;
      color: #fff;
      border-color: #1a3a5c;
    }
    .rh-group .btn {
      border-radius: 8px;
      font-size: 1rem;
      padding: 0.5rem 2rem;
    }
    label { font-weight: 600; color: #2c3e50; }
    .badge-note {
      background: #e8f0fb;
      color: #1a3a5c;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.87rem;
      line-height: 1.6;
    }

    /* 제출 완료 화면 */
    #successView { display: none; }
    .check-icon { font-size: 4rem; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 py-4">
  <div class="container" style="max-width: 480px;">

    <!-- 입력 폼 -->
    <div id="formView">
      <div class="card">
        <div class="card-header text-white text-center">
          <h4 class="mb-1 fw-bold">⚔ 인식표 정보 입력</h4>
          <p class="mb-0 opacity-75" style="font-size:0.9rem;">
            법무사관 후보생 — 인식표 제작용 정보 수집
          </p>
        </div>
        <div class="card-body p-4">

          <div id="alertBox" class="alert alert-danger rounded-3 d-none" role="alert"></div>

          <div class="badge-note mb-4">
            입력하신 정보는 인식표 제작 목적으로만 사용됩니다.<br />
            군번 1회 제출 후 수정은 담당자에게 문의해주세요.
          </div>

          <form id="idForm" novalidate>

            <!-- 군번 -->
            <div class="mb-3">
              <label for="gunBun" class="form-label">군번</label>
              <input
                type="text"
                class="form-control"
                id="gunBun"
                placeholder="예) 25-123456"
                autocomplete="off"
                required
              />
            </div>

            <!-- 성명 -->
            <div class="mb-3">
              <label for="name" class="form-label">성명</label>
              <input
                type="text"
                class="form-control"
                id="name"
                placeholder="예) 홍길동"
                autocomplete="off"
                required
              />
            </div>

            <!-- 혈액형 -->
            <div class="mb-3">
              <label for="bloodType" class="form-label">혈액형</label>
              <select class="form-select" id="bloodType" required>
                <option value="" disabled selected>선택하세요</option>
                <option value="A">A형</option>
                <option value="B">B형</option>
                <option value="O">O형</option>
                <option value="AB">AB형</option>
              </select>
            </div>

            <!-- RH -->
            <div class="mb-4">
              <label class="form-label d-block">RH</label>
              <div class="rh-group d-flex gap-3">
                <div>
                  <input type="radio" class="btn-check" name="rh" id="rhPos" value="RH+" required />
                  <label class="btn btn-outline-primary" for="rhPos">RH+</label>
                </div>
                <div>
                  <input type="radio" class="btn-check" name="rh" id="rhNeg" value="RH-" />
                  <label class="btn btn-outline-primary" for="rhNeg">RH-</label>
                </div>
              </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">제출하기</button>
          </form>
        </div>
      </div>
      <p class="text-center text-muted mt-3" style="font-size: 0.8rem;">
        입력 오류 또는 문의: 담당 간부 연락
      </p>
    </div>

    <!-- 제출 완료 화면 -->
    <div id="successView">
      <div class="card text-center p-5">
        <div class="check-icon mb-3">✅</div>
        <h4 class="fw-bold text-success mb-2">제출 완료!</h4>
        <p class="text-muted mb-0">
          <strong id="successName"></strong> 후보생의<br />
          인식표 정보가 정상적으로 접수되었습니다.
        </p>
        <hr class="my-4" />
        <p class="text-muted" style="font-size: 0.88rem;">
          창을 닫으셔도 됩니다.<br />
          수정이 필요한 경우 담당 간부에게 문의해주세요.
        </p>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const form = document.getElementById("idForm");
    const alertBox = document.getElementById("alertBox");
    const submitBtn = document.getElementById("submitBtn");

    function showError(msg) {
      alertBox.textContent = msg;
      alertBox.classList.remove("d-none");
      submitBtn.disabled = false;
      submitBtn.textContent = "제출하기";
    }

    function onSuccess(result) {
      if (result.ok) {
        document.getElementById("successName").textContent =
          document.getElementById("name").value.trim();
        document.getElementById("formView").style.display = "none";
        document.getElementById("successView").style.display = "block";
      } else {
        showError(result.message);
      }
    }

    function onFailure(err) {
      showError("서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      alertBox.classList.add("d-none");

      const gunBun = document.getElementById("gunBun").value.trim();
      const name = document.getElementById("name").value.trim();
      const bloodType = document.getElementById("bloodType").value;
      const rhEl = document.querySelector('input[name="rh"]:checked');

      if (!gunBun || !name || !bloodType || !rhEl) {
        showError("모든 항목을 입력해주세요.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "제출 중...";

      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFailure)
        .submitForm({
          gunBun: gunBun,
          name: name,
          bloodType: bloodType,
          rh: rhEl.value,
        });
    });
  </script>
</body>
</html>
